<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <!-- Background gradient - deep dark blue -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#0d1f3c"/>
    </linearGradient>

    <!-- Glass panel gradient -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="50%" style="stop-color:#a8d4ff;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.02"/>
    </linearGradient>

    <!-- Glass top shine -->
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.0"/>
    </linearGradient>

    <!-- Title bar gradient -->
    <linearGradient id="titleBarGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00c8ff;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#0066cc;stop-opacity:0.3"/>
    </linearGradient>

    <!-- MSX logo glow -->
    <radialGradient id="msxGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:0"/>
    </radialGradient>

    <!-- Outer glow for the whole panel -->
    <radialGradient id="outerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0077ff;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#001133;stop-opacity:0"/>
    </radialGradient>

    <!-- Plastic sheen on edge -->
    <linearGradient id="edgeSheen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4dbbff;stop-opacity:0.8"/>
      <stop offset="40%" style="stop-color:#0077cc;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#003366;stop-opacity:0.6"/>
    </linearGradient>

    <!-- Code line gradients -->
    <linearGradient id="codeFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="85%" style="stop-color:#ffffff;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>

    <!-- Blur filter for glass effect -->
    <filter id="glassBlur" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>

    <!-- Glow filter for cyan elements -->
    <filter id="cyanGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Drop shadow for panel -->
    <filter id="panelShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#0044aa" flood-opacity="0.6"/>
    </filter>

    <!-- Clip for rounded panel -->
    <clipPath id="panelClip">
      <rect x="22" y="28" width="212" height="200" rx="16" ry="16"/>
    </clipPath>
  </defs>

  <!-- Background circle glow -->
  <ellipse cx="128" cy="128" rx="115" ry="115" fill="url(#outerGlow)"/>

  <!-- Background -->
  <rect width="256" height="256" rx="40" ry="40" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern in bg -->
  <g opacity="0.06">
    <line x1="0" y1="32" x2="256" y2="32" stroke="#4488ff" stroke-width="0.5"/>
    <line x1="0" y1="64" x2="256" y2="64" stroke="#4488ff" stroke-width="0.5"/>
    <line x1="0" y1="96" x2="256" y2="96" stroke="#4488ff" stroke-width="0.5"/>
    <line x1="0" y1="128" x2="256" y2="128" stroke="#4488ff" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="256" y2="160" stroke="#4488ff" stroke-width="0.5"/>
    <line x1="0" y1="192" x2="256" y2="192" stroke="#4488ff" stroke-width="0.5"/>
    <line x1="0" y1="224" x2="256" y2="224" stroke="#4488ff" stroke-width="0.5"/>
    <line x1="32" y1="0" x2="32" y2="256" stroke="#4488ff" stroke-width="0.5"/>
    <line x1="64" y1="0" x2="64" y2="256" stroke="#4488ff" stroke-width="0.5"/>
    <line x1="96" y1="0" x2="96" y2="256" stroke="#4488ff" stroke-width="0.5"/>
    <line x1="128" y1="0" x2="128" y2="256" stroke="#4488ff" stroke-width="0.5"/>
    <line x1="160" y1="0" x2="160" y2="256" stroke="#4488ff" stroke-width="0.5"/>
    <line x1="192" y1="0" x2="192" y2="256" stroke="#4488ff" stroke-width="0.5"/>
    <line x1="224" y1="0" x2="224" y2="256" stroke="#4488ff" stroke-width="0.5"/>
  </g>

  <!-- === MAIN GLASS PANEL === -->
  <!-- Panel shadow -->
  <rect x="22" y="28" width="212" height="200" rx="16" ry="16" 
        fill="#051020" opacity="0.7" filter="url(#panelShadow)"/>

  <!-- Panel body - frosted glass base -->
  <rect x="22" y="28" width="212" height="200" rx="16" ry="16"
        fill="url(#glassGrad)" stroke="url(#edgeSheen)" stroke-width="1.5"/>

  <!-- Inner content clipped -->
  <g clip-path="url(#panelClip)">

    <!-- Dark inner background for code area -->
    <rect x="22" y="28" width="212" height="200" fill="#060d1e" opacity="0.75"/>

    <!-- Title bar -->
    <rect x="22" y="28" width="212" height="28" fill="url(#titleBarGrad)"/>
    <rect x="22" y="54" width="212" height="1" fill="#00aaff" opacity="0.4"/>

    <!-- Window control dots -->
    <circle cx="40" cy="42" r="5" fill="#ff5f56" opacity="0.9"/>
    <circle cx="55" cy="42" r="5" fill="#ffbd2e" opacity="0.9"/>
    <circle cx="70" cy="42" r="5" fill="#27c93f" opacity="0.9"/>

    <!-- Title text: IDE name area (placeholder label) -->
    <text x="128" y="46" 
          font-family="'Courier New', monospace" 
          font-size="9" 
          font-weight="bold"
          fill="#a0d8ff" 
          text-anchor="middle"
          opacity="0.9">MSX-IDE  —  main.bas</text>

    <!-- Line numbers gutter -->
    <rect x="22" y="55" width="28" height="173" fill="#0a1628" opacity="0.8"/>
    <line x1="50" y1="55" x2="50" y2="228" stroke="#1a3060" stroke-width="1"/>

    <!-- Line numbers -->
    <g font-family="'Courier New', monospace" font-size="7" fill="#3a6090" text-anchor="middle">
      <text x="36" y="70">1</text>
      <text x="36" y="84">2</text>
      <text x="36" y="98">3</text>
      <text x="36" y="112">4</text>
      <text x="36" y="126">5</text>
      <text x="36" y="140">6</text>
      <text x="36" y="154">7</text>
      <text x="36" y="168">8</text>
      <text x="36" y="182">9</text>
      <text x="36" y="196">10</text>
      <text x="36" y="210">11</text>
    </g>

    <!-- === MSX-BASIC CODE === -->
    <!-- Line 1: 10 CLS -->
    <text x="56" y="70" font-family="'Courier New', monospace" font-size="7.5" fill="#00e5ff" filter="url(#cyanGlow)">
      <tspan fill="#ff9944">10 </tspan><tspan fill="#00ccff">CLS</tspan>
    </text>

    <!-- Line 2: 20 PRINT -->
    <text x="56" y="84" font-family="'Courier New', monospace" font-size="7.5">
      <tspan fill="#ff9944">20 </tspan><tspan fill="#00ccff">PRINT</tspan><tspan fill="#aaddff"> "MSX IDE"</tspan>
    </text>

    <!-- Line 3: 30 COLOR -->
    <text x="56" y="98" font-family="'Courier New', monospace" font-size="7.5">
      <tspan fill="#ff9944">30 </tspan><tspan fill="#00ccff">COLOR</tspan><tspan fill="#aaddff"> 15,1,1</tspan>
    </text>

    <!-- Line 4: 40 SCREEN -->
    <text x="56" y="112" font-family="'Courier New', monospace" font-size="7.5">
      <tspan fill="#ff9944">40 </tspan><tspan fill="#00ccff">SCREEN</tspan><tspan fill="#aaddff"> 2</tspan>
    </text>

    <!-- Line 5: 50 FOR -->
    <text x="56" y="126" font-family="'Courier New', monospace" font-size="7.5">
      <tspan fill="#ff9944">50 </tspan><tspan fill="#cc88ff">FOR</tspan><tspan fill="#aaddff"> I=1 </tspan><tspan fill="#cc88ff">TO</tspan><tspan fill="#aaddff"> 10</tspan>
    </text>

    <!-- Line 6: 60 PSET -->
    <text x="56" y="140" font-family="'Courier New', monospace" font-size="7.5">
      <tspan fill="#ff9944">60 </tspan><tspan fill="#00ccff">PSET</tspan><tspan fill="#aaddff"> (I*20,100)</tspan>
    </text>

    <!-- Line 7: 70 NEXT -->
    <text x="56" y="154" font-family="'Courier New', monospace" font-size="7.5">
      <tspan fill="#ff9944">70 </tspan><tspan fill="#cc88ff">NEXT</tspan><tspan fill="#aaddff"> I</tspan>
    </text>

    <!-- Line 8: 80 GOTO -->
    <text x="56" y="168" font-family="'Courier New', monospace" font-size="7.5">
      <tspan fill="#ff9944">80 </tspan><tspan fill="#cc88ff">GOTO</tspan><tspan fill="#aaddff"> 20</tspan>
    </text>

    <!-- Cursor blink line -->
    <text x="56" y="182" font-family="'Courier New', monospace" font-size="7.5">
      <tspan fill="#ff9944">90 </tspan><tspan fill="#00ccff">END</tspan>
    </text>

    <!-- Cursor block -->
    <rect x="56" y="186" width="5" height="9" fill="#00e5ff" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0;0.9" dur="1.2s" repeatCount="indefinite"/>
    </rect>

    <!-- Separator / status bar -->
    <rect x="22" y="218" width="212" height="10" fill="#0a2040" opacity="0.9"/>
    <line x1="22" y1="218" x2="234" y2="218" stroke="#00aaff" stroke-width="0.5" opacity="0.5"/>
    <text x="30" y="226" font-family="'Courier New', monospace" font-size="6" fill="#4488aa">MSX-BASIC  |  Ln 9  Col 1  |  UTF-8</text>

  </g>

  <!-- === GLASS OVERLAY EFFECTS === -->
  <!-- Top shine reflection -->
  <rect x="22" y="28" width="212" height="60" rx="16" ry="16"
        fill="url(#shineGrad)" opacity="0.5" filter="url(#glassBlur)"/>

  <!-- Left edge highlight -->
  <line x1="23.5" y1="44" x2="23.5" y2="210" stroke="#ffffff" stroke-width="1" opacity="0.15"/>

  <!-- Top edge highlight -->
  <line x1="38" y1="29.5" x2="218" y2="29.5" stroke="#ffffff" stroke-width="1" opacity="0.2"/>

  <!-- Panel border glow -->
  <rect x="22" y="28" width="212" height="200" rx="16" ry="16"
        fill="none" stroke="#00aaff" stroke-width="0.8" opacity="0.35"/>

  <!-- === MSX BADGE === -->
  <!-- Badge backing glow -->
  <ellipse cx="196" cy="62" rx="26" ry="13" fill="url(#msxGlow)"/>

  <!-- Badge pill -->
  <rect x="170" y="50" width="52" height="24" rx="12" ry="12"
        fill="#001830" stroke="#00e5ff" stroke-width="1.5" opacity="0.95"/>

  <!-- MSX text -->
  <text x="196" y="66" 
        font-family="'Courier New', monospace" 
        font-size="11" 
        font-weight="bold"
        fill="#00e5ff" 
        text-anchor="middle"
        filter="url(#cyanGlow)">MSX</text>

</svg>
